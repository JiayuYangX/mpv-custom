## 右键菜单 (dynamic_menu) 及其按键绑定

Ctrl+o              script-message-to dialog open                                               #menu: 打开文件...
Ctrl+O              script-message-to dialog open-folder                                        #menu: 打开文件夹...
_                   ignore                                                                      #menu: 播放列表 #@playlist
_                   ignore                                                                      #menu: 最近播放 #@history
_                   ignore                                                                      #menu: -
_                   no-osd set video-aspect-override "16:9";   show-text "比例: ${video-aspect-override}"                               #menu: 显示比例 > 16:9   #@state=(video_aspect_override==16.0/9.0 and 'checked')
_                   no-osd set video-aspect-override "4:3";    show-text "比例: ${video-aspect-override}"                               #menu: 显示比例 > 4:3    #@state=(video_aspect_override==4.0/3.0  and 'checked')
_                   no-osd set video-aspect-override "2.35:1"; show-text "比例: ${video-aspect-override}"                               #menu: 显示比例 > 2.35:1 #@state=(video_aspect_override==2.35     and 'checked')
_                   ignore                                                                                                              #menu: 显示比例 > -
A                   no-osd cycle-values video-aspect-override "16:9" "4:3" "2.35:1" "no"; show-text "比例: ${video-aspect-override}"    #menu: 显示比例 > 切换显示比例
_                   no-osd set video-aspect-override "no"; show-text "比例: ${video-aspect-override}"                                   #menu: 显示比例 > 重置
_                   no-osd set speed 2.0;  show-text "速度: ${speed}"                           #menu: 播放速度 > 2.0  #@state=(speed==2.0  and 'checked')
_                   no-osd set speed 1.5;  show-text "速度: ${speed}"                           #menu: 播放速度 > 1.5  #@state=(speed==1.5  and 'checked')
_                   no-osd set speed 1.25; show-text "速度: ${speed}"                           #menu: 播放速度 > 1.25 #@state=(speed==1.25 and 'checked')
_                   no-osd set speed 1.0;  show-text "速度: ${speed}"                           #menu: 播放速度 > 1.0  #@state=(speed==1.0  and 'checked')
_                   no-osd set speed 0.75; show-text "速度: ${speed}"                           #menu: 播放速度 > 0.75 #@state=(speed==0.75 and 'checked')
_                   no-osd set speed 0.5;  show-text "速度: ${speed}"                           #menu: 播放速度 > 0.5  #@state=(speed==0.5  and 'checked')
_                   ignore                                                                      #menu: 播放速度 > -
]                   no-osd add speed +0.1; show-text "速度: ${speed}"                           #menu: 播放速度 > 速度增加 0.1
[                   no-osd add speed -0.1; show-text "速度: ${speed}"                           #menu: 播放速度 > 速度减少 0.1
}                   no-osd multiply speed 2.0; show-text "速度: ${speed}"                       #menu: 播放速度 > 速度×2
{                   no-osd multiply speed 0.5; show-text "速度: ${speed}"                       #menu: 播放速度 > 速度×0.5
_                   ignore                                                                      #menu: 播放速度 > -
BS                  no-osd set speed 1.0; show-text "速度: ${speed}"                            #menu: 播放速度 > 重置
Up                  no-osd add volume +5; show-text "音量: ${volume}%"                          #menu: 音量 > 增加 5%
Down                no-osd add volume -5; show-text "音量: ${volume}%"                          #menu: 音量 > 减少 5%
Shift+Up            no-osd add volume +2; show-text "音量: ${volume}%"                          #menu: 音量 > 增加 2%
Shift+Down          no-osd add volume -2; show-text "音量: ${volume}%"                          #menu: 音量 > 减少 2%
_                   ignore                                                                      #menu: 音量 > -
m                   no-osd cycle mute; show-text "${?mute==yes:静音}${?mute==no:取消静音}"      #menu: 音量 > 静音 #@state=(mute and 'checked')
_                   no-osd set volume 100; no-osd set mute no; show-text "音量: ${volume}%"     #menu: 音量 > 重置
s                   screenshot                                                                  #menu: 截图 > 保存到指定目录 (带字幕)
S                   screenshot video                                                            #menu: 截图 > 保存到指定目录
Ctrl+s              screenshot window                                                           #menu: 截图 > 保存到指定目录 (窗口)
Alt+s               screenshot each-frame                                                       #menu: 截图 > 连续每帧截图到指定目录
_                   ignore                                                                      #menu: 截图 > -
c                   script-binding clipshot/clipshot-subs                                       #menu: 截图 > 复制到剪贴板 (带字幕)
C                   script-binding clipshot/clipshot-video                                      #menu: 截图 > 复制到剪贴板
Ctrl+c              script-binding clipshot/clipshot-window                                     #menu: 截图 > 复制到剪贴板 (窗口)
_                   ignore                                                                      #menu: -
Shift+Right         seek +1 exact;   script-message-to osd_msg show-time "▶▶ 快进 1 秒 (精确) / %02d:%02d:%02d"       #menu: 导航 > 定位 > 快进 1 秒
Shift+Left          seek -1 exact;   script-message-to osd_msg show-time "◀◀ 快退 1 秒 (精确) / %02d:%02d:%02d"       #menu: 导航 > 定位 > 快退 1 秒
Right               seek +5;         script-message-to osd_msg show-time "▶▶ 快进 5 秒 (关键帧) / %02d:%02d:%02d"     #menu: 导航 > 定位 > 快进 5 秒
Left                seek -5;         script-message-to osd_msg show-time "◀◀ 快退 5 秒 (关键帧) / %02d:%02d:%02d"     #menu: 导航 > 定位 > 快退 5 秒
Ctrl+Right          seek +60;        script-message-to osd_msg show-time "▶▶ 快进 60 秒 (关键帧) / %02d:%02d:%02d"    #menu: 导航 > 定位 > 快进 60 秒
Ctrl+Left           seek -60;        script-message-to osd_msg show-time "◀◀ 快退 60 秒 (关键帧) / %02d:%02d:%02d"    #menu: 导航 > 定位 > 快退 60 秒
Shift+Pgdwn         seek +600;       script-message-to osd_msg show-time "▶▶ 快进 10 分钟 (关键帧) / %02d:%02d:%02d"  #menu: 导航 > 定位 > 快进 10 分钟
Shift+Pgup          seek -600;       script-message-to osd_msg show-time "◀◀ 快退 10 分钟 (关键帧) / %02d:%02d:%02d"  #menu: 导航 > 定位 > 快退 10 分钟
_                   ignore                                                                                              #menu: 导航 > 定位 > -
,                   frame-back-step; script-message-to osd_msg show-time "◀◀ 帧步退 / %02d:%02d:%06.3f"               #menu: 导航 > 定位 > 上一帧
.                   frame-step     ; script-message-to osd_msg show-time "▶▶ 帧步进 / %02d:%02d:%06.3f"               #menu: 导航 > 定位 > 下一帧
_                   ignore                                                                      #menu: 导航 > 定位 > -
Ctrl+Shift+Left     no-osd sub-seek -1; show-text "上一条字幕"                                  #menu: 导航 > 定位 > 定位到上一条字幕
Ctrl+Shift+Right    no-osd sub-seek +1; show-text "下一条字幕"                                  #menu: 导航 > 定位 > 定位到下一条字幕
_                   ignore                                                                      #menu: 导航 > 定位 > -
Shift+BS            revert-seek; script-message-to osd_msg show-time "撤销定位: %02d:%02d:%02d" #menu: 导航 > 定位 > 撤销上一次（或标记的）定位
Shift+Ctrl+BS       revert-seek mark; script-message-to osd_msg show-time "标记当前位置: %02d:%02d:%02d"    #menu: 导航 > 定位 > 标记当前位置
_                   ignore                                                                      #menu: 导航 > -
_                   ignore                                                                      #menu: 导航 > 切换章节 #@chapters
E                   no-osd cycle edition; script-message-to osd_msg show-edition                #menu: 导航 > 切换版本 #@editions
Home                seek 0 absolute; script-message-to osd_msg show-time "跳转至开头 / %02d:%02d:%02d"  #menu: 导航 > 跳转到文件开头
Pgup                no-osd add chapter -1; script-message-to osd_msg show-chapter               #menu: 导航 > 跳转到上一个章节
Pgdwn               no-osd add chapter +1; script-message-to osd_msg show-chapter               #menu: 导航 > 跳转到下一个章节
_                   ignore                                                                      #menu: 导航 > -
l                   ab-loop                                                                     #menu: 导航 > 设置/清除 A-B 循环点
L                   no-osd cycle-values loop-file "inf" "no"; show-text "循环当前文件: ${loop-file}"    #menu: 导航 > 切换循环播放 #@state=(loop_file and 'checked')
_                   ignore                                                                      #menu: 导航 > -
<                   playlist-prev; script-message-to osd_msg show-filename                      #menu: 导航 > 切换到上一个文件
>                   playlist-next; script-message-to osd_msg show-filename                      #menu: 导航 > 切换到下一个文件
