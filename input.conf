## 其他按键绑定

# 鼠标按键和滚轮
MBTN_LEFT           cycle pause
MBTN_LEFT           cycle pause                         #event: click
MBTN_LEFT           cycle fullscreen                    #event: double_click
MBTN_LEFT_DBL       ignore
MBTN_RIGHT          context-menu
WHEEL_DOWN          no-osd add volume -2; show-text "音量: ${volume}%"
WHEEL_UP            no-osd add volume +2; show-text "音量: ${volume}%"

# 长按右键快进 (inputevent.lua 支持)
# Right               seek 5                              #event: click
# Right               no-osd set speed 5; set pause no    #event: press
# Right               ignore                              #event: release
# 调用 evafast.lua 脚本实现方式
Right               seek 5; script-message-to osd_msg show-time "▶▶ 快进 5 秒 (关键帧) / %02d:%02d:%02d"  #event:click
Right               set pause no; script-binding evafast/speedup                                            #event: press
Right               script-binding evafast/slowdown                                                         #event: release

# 补充切换视频轨道的案件绑定 (dyn_menu 会忽略下划线绑定)
_                   no-osd cycle video; show-text "视频轨道: ${video}"

Space               cycle pause
p                   cycle pause
f                   cycle fullscreen
F11                 cycle fullscreen
Esc                 set fullscreen no
o                   show-progress
P                   show-progress
i                   script-binding stats/display-stats
Q                   quit-watch-later
J                   no-osd cycle sub down; show-text "主字幕: ${sub}"
Alt+J               no-osd cycle secondary-sid down; show-text "次字幕: ${secondary-sid}"
Ctrl+v              loadfile ${clipboard/text} append-play; show-text "+ ${clipboard/text}"
Ctrl+w              quit

Ctrl+KP_Subtract    no-osd add video-zoom -0.05; show-text "缩放: ${video-zoom}"
Ctrl+KP_Add         no-osd add video-zoom +0.05; show-text "缩放: ${video-zoom}"
Ctrl+KP1            no-osd add video-pan-x -0.01; no-osd add video-pan-y +0.01; show-text "水平位移: ${video-pan-x}, 垂直位移: ${video-pan-y}"
Ctrl+KP3            no-osd add video-pan-x +0.01; no-osd add video-pan-y +0.01; show-text "水平位移: ${video-pan-x}, 垂直位移: ${video-pan-y}"
Ctrl+KP7            no-osd add video-pan-x -0.01; no-osd add video-pan-y -0.01; show-text "水平位移: ${video-pan-x}, 垂直位移: ${video-pan-y}"
Ctrl+KP9            no-osd add video-pan-x +0.01; no-osd add video-pan-y -0.01; show-text "水平位移: ${video-pan-x}, 垂直位移: ${video-pan-y}"
Ctrl+KP_Pgup        no-osd add video-align-x +0.01; no-osd add video-align-y -0.01; show-text "水平对齐: ${video-align-x}, 垂直对齐: ${video-align-y}"
Ctrl+KP_Home        no-osd add video-align-x -0.01; no-osd add video-align-y -0.01; show-text "水平对齐: ${video-align-x}, 垂直对齐: ${video-align-y}"
Ctrl+KP_Pgdwn       no-osd add video-align-x +0.01; no-osd add video-align-y +0.01; show-text "水平对齐: ${video-align-x}, 垂直对齐: ${video-align-y}"
Ctrl+KP_End         no-osd add video-align-x -0.01; no-osd add video-align-y +0.01; show-text "水平对齐: ${video-align-x}, 垂直对齐: ${video-align-y}"
Ctrl+KP5            no-osd set video-pan-x 0; no-osd set video-pan-y 0; show-text "重置位移"
Ctrl+KP_Begin       no-osd set video-align-x 0; no-osd set video-align-y 0; show-text "重置对齐"
Ctrl+Alt+KP5        no-osd set video-scale-x 1; no-osd set video-scale-y 1; show-text "重置垂直/水平缩放"